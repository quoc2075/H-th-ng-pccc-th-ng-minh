<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Alerts Scroll</title>
<style>
/* ======================= THEME ======================= */
:root {
  --bg: #0c0c0c;
  --panel: #151515;
  --panel-2: #101010;
  --border: #222;
  --text: #f0f0f0;
  --muted: #b5b5b5;
  --accent: #ff7b00;
  --danger: #ff3b30;
  --primary: #ff4500;
}

/* ======================= BASE ======================= */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg);
  font-family: 'Roboto', sans-serif;
  color: var(--text);
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden; /* chỉ con được cuộn */
}

/* ======================= HEADER ======================= */
header.appbar {
  background: linear-gradient(90deg, #a50000, var(--primary));
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  flex-shrink: 0;
  height: 64px;
  box-sizing: border-box;
}

/* ======================= DASHBOARD ======================= */
.dashboard {
  flex: 1;
  display: grid;
  grid-template-columns: 70% 30%;
  min-height: 0; /* CHÌA KHÓA */
}

/* ======================= LEFT ======================= */
.left {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0; /* CHÌA KHÓA */
}

.left .cams {
  flex: 4 1 0%;
  background: var(--panel);
  overflow-y: auto;
  padding: 10px;
  min-height: 0;
}

.left .alerts {
  flex: 1 1 0%;
  background: var(--panel-2);
  border-top: 1px solid var(--border);
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0; /* CHÌA KHÓA */
}

/* ======================= RIGHT ======================= */
.right {
  background: #0f0f0f;
  overflow-y: auto;
  padding: 16px;
}

/* ======================= Alert item ======================= */
.alert-item {
  background: #2b0000;
  border-left: 4px solid red;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 8px;
  color: #ffb4a2;
}

.left .alerts::-webkit-scrollbar {
  width: 6px;
}
.left .alerts::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 6px;
}
</style>
</head>
<body>
<header class="appbar">🔥 Fire Detection Dashboard</header>
<div class="dashboard">
  <div class="left">
    <div class="cams">
      <div style="height: 400px; background: #222; border-radius: 8px;">Camera View</div>
    </div>
    <div class="alerts">
      <h2>🔥 Cảnh báo</h2>
      <!-- tạo nhiều alert cho test -->
      <div class="alert-item">Cảnh báo 1</div>
      <div class="alert-item">Cảnh báo 2</div>
      <div class="alert-item">Cảnh báo 3</div>
      <div class="alert-item">Cảnh báo 4</div>
      <div class="alert-item">Cảnh báo 5</div>
      <div class="alert-item">Cảnh báo 6</div>
      <div class="alert-item">Cảnh báo 7</div>
      <div class="alert-item">Cảnh báo 8</div>
      <div class="alert-item">Cảnh báo 9</div>
      <div class="alert-item">Cảnh báo 10</div>
      <div class="alert-item">Cảnh báo 11</div>
      <div class="alert-item">Cảnh báo 12</div>
      <div class="alert-item">Cảnh báo 13</div>
      <div class="alert-item">Cảnh báo 14</div>
      <div class="alert-item">Cảnh báo 15</div>
    </div>
  </div>
  <div class="right">
    <div class="panel">Panel phải</div>
  </div>
</div>
</body>
</html>
